name: flutter_todo_app
description: A premium, modern Todo List application built with Flutter, Material 3,
  clean architecture, Riverpod, and Hive. Features glassmorphism UI, beautiful animations,
  statistics dashboard, dark/light mode, categories, priorities, due dates, search, and filters.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

  # Styling & fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Routing
  go_router: ^14.6.1

  # Charts for statistics
  fl_chart: ^0.69.0

  # Swipe-to-action list items
  flutter_slidable: ^3.1.1

  # Haptic feedback for dialogs
  cupertino_icons: ^1.0.8

  # Scheduled notifications & exact alarms for reminders
  flutter_local_notifications: ^18.0.1

  # Text-to-speech for voice reminders ("Boss, apko sabji lena hai")
  flutter_tts: ^4.2.0

  # Timezone support for scheduling notifications
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
