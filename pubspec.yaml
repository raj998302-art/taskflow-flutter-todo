name: flutter_todo_app
description: A premium, modern Todo List application built with Flutter, Material 3,
  clean architecture, Riverpod, and Hive. Features glassmorphism UI, beautiful animations,
  statistics dashboard, dark/light mode, categories, priorities, due dates, search, and filters.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0

  # Styling & fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.0

  # Routing
  go_router: ^14.6.1

  # Charts for statistics
  fl_chart: ^0.69.0

  # Swipe-to-action list items
  flutter_slidable: ^3.1.1

  # Haptic feedback for dialogs
  cupertino_icons: ^1.0.8

  # Scheduled notifications & exact alarms for reminders
  flutter_local_notifications: ^18.0.1

  # Text-to-speech for voice reminders ("Boss, apko sabji lena hai")
  flutter_tts: ^4.2.0

  # Timezone support for scheduling notifications
  timezone: ^0.9.4

  # Biometric authentication (fingerprint / face unlock) for app lock
  local_auth: ^2.3.0

  # Confetti animation on task completion
  confetti: ^0.8.0

  # Simple key-value store for app settings (onboarding seen, app lock, etc.)
  shared_preferences: ^2.3.3

  # Speech-to-text for voice input (quick add tasks/reminders)
  speech_to_text: ^7.0.0

  # Haptic feedback utilities
  flutter_haptic: ^0.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#7C5CFC"
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
