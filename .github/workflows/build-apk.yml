name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Download Android dependencies
        run: |
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "platforms;android-35" "platforms;android-36" \
            "build-tools;36.0.0" "ndk;28.2.13676358" "cmake;3.22.1" || true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Get Flutter packages
        run: flutter pub get

      - name: Analyze code (non-blocking)
        run: flutter analyze || true

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             Taskflow-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taskflow-release-apk
          path: Taskflow-release.apk
          retention-days: 90

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Taskflow v1.0.0
          body: |
            ## Taskflow — Premium Flutter Todo App with Voice Reminders

            ### Features
            - Tasks: CRUD, categories, priorities, due dates, search, filters, statistics dashboard
            - Reminders: voice alarms with TTS ("Boss, apko sabji lena hai"), exact-time scheduling, repeat options
            - Glassmorphism UI, Material 3, dark/light mode, animations
            - Fully offline (Hive local DB)

            ### Install
            Download `Taskflow-release.apk` below and install on your Android device.
          files: Taskflow-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
